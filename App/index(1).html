<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransLog — Gestión de Transporte Corporativo</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090d;color:#eaf0fb;font-family:'Inter',sans-serif;font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#07090d}::-webkit-scrollbar-thumb{background:#1a2332;border-radius:2px}
input,select,button,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:1px solid #10d9a8}
@keyframes pulse_{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes prog{to{width:96%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.pa{animation:fadeIn .22s ease}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 340px;gap:12px}
.g2b{display:grid;grid-template-columns:1fr 310px;gap:12px}
.g2c{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g2d{display:grid;grid-template-columns:1fr 280px;gap:14px}
@media(max-width:900px){.g4,.g3,.g2,.g2b,.g2c,.g2d{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.g4{grid-template-columns:1fr 1fr}}
.sidebar{transition:transform .25s}
.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99}
@media(max-width:900px){.sidebar{transform:translateX(-230px)}.sidebar.open{transform:translateX(0)}.so.show{display:block}.mc{margin-left:0!important}.hb{display:flex!important}}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.mbox{background:#0d1117;border:1px solid #1a2332;border-radius:18px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease}
.map-frame{width:100%;height:400px;border-radius:12px;overflow:hidden;border:1px solid #1a2332;background:#0d1117}
@media(max-width:600px){.map-frame{height:280px}}
table{width:100%;border-collapse:collapse}
.rt thead{border-bottom:1px solid #1a2332}
.rt th{padding:9px 16px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#3d5470;font-family:'JetBrains Mono',monospace;font-weight:400}
.rt td{padding:11px 16px;border-bottom:1px solid #111820;font-size:13px;vertical-align:middle}
.rt tr:last-child td{border-bottom:none}
.rt tbody tr:hover td{background:#0d1520}
@media(max-width:700px){.rt thead{display:none}.rt tr{display:flex;flex-direction:column;padding:12px 16px;border-bottom:1px solid #1a2332}.rt td{padding:2px 0!important;border:none!important;font-size:12px}.rt td:first-child{font-weight:700;font-size:13px;color:#eaf0fb;margin-bottom:4px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const T={ok:mkT(C.a,"rgba(16,217,168,.08)"),warn:mkT(C.y,"rgba(251,191,36,.08)"),bad:mkT(C.r,"rgba(244,63,94,.08)"),p:mkT(C.p,"rgba(129,140,248,.08)"),m:mkT(C.m,"rgba(61,84,112,.12)"),o:mkT(C.o,"rgba(249,115,22,.08)")};

const fmt=n=>"$"+Number(n).toLocaleString("es-DO",{minimumFractionDigits:0});

const pct=(a,b)=>b>0?Math.round(a/b*100):0;
const uid=()=>"id"+Date.now()+Math.random().toString(36).slice(2,6);

// ─── PRIMITIVES ──────────────────────────────────────────────────────────────
function Card({children,style={}}){
  return <div style={{background:C.s,border:"1px solid "+C.b,borderRadius:16,overflow:"hidden",...style}}>{children}</div>;
}
function CH({title,icon,right,sub}){
  return <div style={{padding:"16px 20px",borderBottom:"1px solid "+C.b,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
    <div>
      <div style={{fontFamily:FH,fontSize:16,fontWeight:600,color:C.t,display:"flex",alignItems:"center",gap:8}}>{icon&&<span>{icon}</span>}{title}</div>
      {sub&&<div style={{fontSize:11,color:C.m,marginTop:2,fontFamily:FM}}>{sub}</div>}
    </div>
    {right}
  </div>;
}
function KPI({label,value,sub,color,icon}){
  return <Card style={{padding:"20px 22px",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-10,right:-10,width:70,height:70,borderRadius:"50%",background:color,opacity:.07}}/>
    <div style={{fontSize:10,color:C.m,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:10,fontFamily:FM}}>{icon} {label}</div>
    <div style={{fontFamily:FH,fontSize:32,fontWeight:700,color,letterSpacing:"-1.5px",lineHeight:1}}>{value}</div>
    <div style={{fontSize:11,color:C.m,marginTop:8,fontFamily:FM}}>{sub}</div>
  </Card>;
}
function Btn({children,primary,danger,ghost,small,onClick,disabled,style={}}){
  const[h,sH]=React.useState(false);
  const bg=disabled?"#111820":primary?(h?"#0ff5c0":C.a):danger?(h?"#ff2244":C.r):ghost?"transparent":(h?C.s3:C.s2);
  const col=disabled?C.m:primary?C.bg:danger?"#fff":ghost?(h?C.t:C.m):C.m;
  return <button onClick={onClick} disabled={disabled} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}
    style={{padding:small?"6px 14px":"10px 20px",borderRadius:9,fontSize:small?11:13,fontFamily:FB,fontWeight:600,
      cursor:disabled?"not-allowed":"pointer",background:bg,color:col,
      border:ghost?"1px solid "+C.b:(primary||danger?"none":"1px solid "+C.b),
      opacity:disabled?.5:1,display:"inline-flex",alignItems:"center",gap:6,transition:"all .15s",...style}}>
    {children}
  </button>;
}
function Field({label,required,children}){
  return <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div style={{fontSize:11,color:C.m,fontFamily:FM,textTransform:"uppercase",letterSpacing:"0.6px"}}>
      {label}{required&&<span style={{color:C.r,marginLeft:3}}>*</span>}
    </div>
    {children}
  </div>;
}
const INP={width:"100%",background:C.s2,border:"1px solid "+C.b2,borderRadius:9,padding:"10px 13px",color:C.t,fontSize:13,boxSizing:"border-box",transition:"border-color .15s"};
function Input({...props}){
  const[f,sF]=React.useState(false);
  return <input {...props} onFocus={()=>sF(true)} onBlur={()=>sF(false)} style={{...INP,...props.style,borderColor:f?C.a:C.b2}}/>;
}
function Select({children,...props}){
  const[f,sF]=React.useState(false);
  return <select {...props} onFocus={()=>sF(true)} onBlur={()=>sF(false)} style={{...INP,...props.style,borderColor:f?C.a:C.b2}}>{children}</select>;
}
function EffBar({pct:p,color=C.a}){
  return <div style={{display:"flex",alignItems:"center",gap:8}}>
    <div style={{flex:1,height:4,background:C.s3,borderRadius:2,overflow:"hidden"}}>
      <div style={{width:p+"%",height:"100%",background:color,borderRadius:2}}/>
    </div>
    <span style={{fontSize:10,fontFamily:FM,color:C.m,minWidth:28}}>{p}%</span>
  </div>;
}
function Ring({value,color,label}){
  const r=34,circ=2*Math.PI*r,dash=circ-(value/100)*circ;
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
    <div style={{position:"relative",width:88,height:88}}>
      <svg width="88" height="88" viewBox="0 0 88 88" style={{transform:"rotate(-90deg)"}}>
        <circle cx="44" cy="44" r={r} fill="none" stroke={C.s3} strokeWidth="7"/>
        <circle cx="44" cy="44" r={r} fill="none" stroke={color} strokeWidth="7" strokeDasharray={circ} strokeDashoffset={dash} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontFamily:FH,fontSize:17,fontWeight:700,color}}>{value}%</span>
      </div>
    </div>
    <span style={{fontSize:10,color:C.m,fontFamily:FM}}>{label}</span>
  </div>;
}
function Modal({title,sub,onClose,children}){
  return <div className="mbg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="mbox">
      <div style={{padding:"18px 22px",borderBottom:"1px solid "+C.b,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontFamily:FH,fontSize:17,fontWeight:600,color:C.t}}>{title}</div>
          {sub&&<div style={{fontSize:11,color:C.m,marginTop:3,fontFamily:FM}}>{sub}</div>}
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.m,fontSize:20,cursor:"pointer",lineHeight:1,marginLeft:12}}>✕</button>
      </div>
      <div style={{padding:22}}>{children}</div>
    </div>
  </div>;
}
function SaveBtn({saved,label="Guardar",onClick,disabled}){
  return <Btn primary onClick={onClick} disabled={disabled}>
    {saved?"✅ Guardado":label}
  </Btn>;
}

// ─── MAP COMPONENT ───────────────────────────────────────────────────────────
function MapView({routes,vehicles,destinations,users,selectedRoute}){
  const mapRef=React.useRef(null);
  const [mapLoaded,setMapLoaded]=React.useState(false);

  // Build OpenStreetMap URL with markers
  // Using OpenStreetMap iframe (no API key needed)
  const getMapUrl=()=>{
    // Center on Santo Domingo
    const lat=18.4861, lng=-69.9312, zoom=12;
    return "https://www.openstreetmap.org/export/embed.html?bbox="+
      (lng-.15)+"%2C"+(lat-.12)+"%2C"+(lng+.15)+"%2C"+(lat+.12)+
      "&layer=mapnik&marker="+lat+"%2C"+lng;
  };

  // OpenStreetMap only — no API key needed
  const osmUrl=getMapUrl();

  return <div style={{display:"flex",flexDirection:"column",gap:12}}>
    {/* Route selector */}
    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:12,color:C.m,fontFamily:FM}}>VER RUTA:</span>
      {routes.filter(r=>r.active).map(r=>(
        <div key={r.id} onClick={()=>{}} style={{
          padding:"5px 12px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:FM,
          background:selectedRoute===r.id?"rgba(16,217,168,.12)":C.s2,
          border:"1px solid "+(selectedRoute===r.id?C.a:C.b),
          color:selectedRoute===r.id?C.a:C.m,transition:"all .15s"
        }}>{r.code}</div>
      ))}
    </div>

    {/* Map */}
    <div className="map-frame">
      <iframe
        src={osmUrl}
        width="100%" height="100%"
        style={{border:0,display:"block"}}
        loading="lazy"
        title="Mapa de rutas TransLog"
      />
    </div>

    {/* Route stats below map */}
    <div className="g3" style={{gap:10}}>
      {routes.filter(r=>r.active).slice(0,3).map(r=>{
        const v=vehicles.find(x=>x.id===r.vId)||{};
        const routeUsers=users.filter(u=>{
          const dest=destinations.find(d=>d.id===u.dId);
          return dest&&r.name.toLowerCase().includes(dest.zone.toLowerCase());
        });
        return <div key={r.id} style={{background:C.s2,borderRadius:10,padding:"12px 14px",border:"1px solid "+C.b}}>
          <div style={{fontFamily:FM,fontSize:10,color:C.a,marginBottom:6}}>{r.code}</div>
          <div style={{fontSize:13,fontWeight:600,color:C.t,marginBottom:4}}>{r.name}</div>
          <div style={{fontSize:11,color:C.m}}>{v.plate||"—"} · {r.km}km · {routeUsers.length} empleados</div>
          <div style={{marginTop:8}}><EffBar pct={Math.round(routeUsers.length/(v.cap||1)*100)} color={C.a}/></div>
        </div>;
      })}
    </div>

    {/* Destinations list */}
    <Card>
      <CH title="Destinos Registrados" icon="📍" sub={destinations.length+" destinos activos"}/>
      <div>
        {destinations.map(d=>{
          const dUsers=users.filter(u=>u.dId===d.id);
          return <div key={d.id} style={{padding:"12px 20px",borderBottom:"1px solid "+C.b,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{width:36,height:36,borderRadius:9,background:"rgba(16,217,168,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📍</div>
            <div style={{flex:1,minWidth:100}}>
              <div style={{fontSize:13,fontWeight:600,color:C.t}}>{d.name}</div>
              <div style={{fontSize:11,color:C.m,marginTop:2}}>{d.address}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontFamily:FM,fontSize:10,color:C.m}}>{d.lat.toFixed(4)}, {d.lng.toFixed(4)}</span>
              <span style={T.p}>{d.zone}</span>
              <span style={T.ok}>{dUsers.length} empleados</span>
            </div>
          </div>;
        })}
      </div>
    </Card>
  </div>;
}

// ─── MODAL: CONDUCTOR ─────────────────────────────────────────────────────────
function ModalConductor({existing,onSave,onClose}){
  const isEdit=!!existing;
  const[f,sF]=React.useState(existing||{driver:"",plate:"",type:"Van",cap:"",fuel:"Gasolina",phone:"",active:true});
  const[saved,sSaved]=React.useState(false);
  const valid=f.driver.trim()&&f.plate.trim()&&f.cap;
  const save=()=>{
    if(!valid)return;
    onSave({...f,cap:parseInt(f.cap),id:f.id||uid()});
    sSaved(true);setTimeout(()=>{sSaved(false);onClose();},1100);
  };
  return <Modal title={isEdit?"Editar Conductor":"Nuevo Conductor"} sub="Datos del vehículo y conductor" onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Field label="Nombre del conductor" required>
        <Input placeholder="Ej: Juan Pérez Rodríguez" value={f.driver} onChange={e=>sF(x=>({...x,driver:e.target.value}))}/>
      </Field>
      <Field label="Teléfono">
        <Input placeholder="809-555-0000" value={f.phone} onChange={e=>sF(x=>({...x,phone:e.target.value}))}/>
      </Field>
      <div className="g2c">
        <Field label="Placa del vehículo" required>
          <Input placeholder="PJD-0000" value={f.plate} onChange={e=>sF(x=>({...x,plate:e.target.value.toUpperCase()}))}/>
        </Field>
        <Field label="Capacidad (personas)" required>
          <Input type="number" min="1" max="100" placeholder="18" value={f.cap} onChange={e=>sF(x=>({...x,cap:e.target.value}))}/>
        </Field>
      </div>
      <div className="g2c">
        <Field label="Tipo de vehículo">
          <Select value={f.type} onChange={e=>sF(x=>({...x,type:e.target.value}))}>
            {["Bus","Minibus","Van","Sedan"].map(t=><option key={t}>{t}</option>)}
          </Select>
        </Field>
        <Field label="Combustible">
          <Select value={f.fuel} onChange={e=>sF(x=>({...x,fuel:e.target.value}))}>
            {["Gasolina","Diesel","Eléctrico","Híbrido"].map(t=><option key={t}>{t}</option>)}
          </Select>
        </Field>
      </div>
      <Field label="Estado">
        <Select value={f.active?"1":"0"} onChange={e=>sF(x=>({...x,active:e.target.value==="1"}))}>
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </Select>
      </Field>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:4}}>
        <Btn ghost onClick={onClose}>Cancelar</Btn>
        <SaveBtn saved={saved} label={isEdit?"Guardar Cambios":"Agregar Conductor"} onClick={save} disabled={!valid}/>
      </div>
    </div>
  </Modal>;
}

// ─── PAGE: COORD DASHBOARD ────────────────────────────────────────────────────
function CoordDashboard({data}){
  const{routes,vehicles,trips}=data;
  const PALETTE=[C.a,C.p,C.o,C.y,C.a,C.p];
  const rs=routes.filter(r=>r.active).map(r=>{
    const ts=trips.filter(t=>t.rId===r.id);
    const tc=ts.reduce((s,t)=>s+t.cost,0),tp=ts.reduce((s,t)=>s+t.pass,0);
    const v=vehicles.find(x=>x.id===r.vId)||{cap:1};
    const ao=ts.length?ts.reduce((s,t)=>s+pct(t.pass,v.cap),0)/ts.length:0;
    return {...r,trips:ts.length,totalCost:tc,totalPass:tp,avgCPP:tp>0?tc/tp:0,avgOcc:Math.round(ao)};
  }).sort((a,b)=>b.totalCost-a.totalCost);
  const totalCost=trips.reduce((s,t)=>s+t.cost,0),totalPass=trips.reduce((s,t)=>s+t.pass,0);

          <div style={{display:"flex",alignItems:"flex-end",gap:8,height:130}}>
            {rs.map((r,i)=>{const h=Math.round((r.totalCost/Math.max(...rs.map(x=>x.totalCost),1))*100);return <div key={r.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontFamily:FM,fontSize:9,color:PALETTE[i]}}>{fmt(r.totalCost)}</div><div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end"}}><div style={{width:"100%",height:h+"%",minHeight:6,background:PALETTE[i],borderRadius:"3px 3px 0 0",opacity:.85}}/></div><div style={{fontFamily:FM,fontSize:9,color:C.m}}>{r.code}</div></div>;})}
          </div>
        </div>
      </Card>
      <Card>
        <CH title="Alertas" icon="⚠️" right={<span style={T.bad}>4 activas</span>}/>
        {[{t:"R-01 sobre presupuesto",m:"+18% vs objetivo",s:"CRITICAL",time:"14:22"},{t:"PJD-4421 baja ocupación",m:"Promedio 44%",s:"WARNING",time:"09:10"},{t:"12 registros OCR pendientes",m:"Requieren validación",s:"INFO",time:"ayer"},{t:"Sucursal B excede límite",m:"$19,200 / $18,000",s:"CRITICAL",time:"lun"}].map((a,i)=>(
          <div key={i} style={{padding:"11px 18px",borderBottom:"1px solid "+C.b,display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:7,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,background:a.s==="CRITICAL"?"rgba(244,63,94,.1)":a.s==="WARNING"?"rgba(251,191,36,.08)":"rgba(129,140,248,.08)"}}>{a.s==="CRITICAL"?"🔴":a.s==="WARNING"?"⚠️":"ℹ️"}</div>

        ))}

    </div>
    <div className="g2b">
      <Card>
        <CH title="Ranking de Rutas" icon="🏆"/>
        <table className="rt">
          <thead><tr>{["#","Ruta","Costo","$/p","Ocup.","Estado"].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{rs.map((r,i)=>{const ec=r.avgOcc>=80?C.a:r.avgOcc>=60?C.y:C.r;const et=r.avgOcc>=80?T.ok:r.avgOcc>=60?T.warn:T.bad;return <tr key={r.id}><td><span style={{fontFamily:FM,fontSize:11,color:C.m}}>{String(i+1).padStart(2,"0")}</span></td><td><div style={{fontFamily:FH,fontSize:13,fontWeight:600,color:C.t}}>{r.name}</div><div style={{fontSize:11,color:C.m}}>{r.code} · {r.trips} viajes</div></td><td style={{fontFamily:FH,fontSize:14,fontWeight:700,color:C.a}}>{fmt(r.totalCost)}</td><td style={{fontFamily:FM,fontSize:11,color:C.t}}>{fmtD(r.avgCPP)}</td><td><EffBar pct={r.avgOcc} color={ec}/></td><td><span style={et}>{r.avgOcc>=80?"Óptima":r.avgOcc>=60?"Revisar":"Ineficiente"}</span></td></tr>;})}
          </tbody>
        </table>
      </Card>
      <Card>
        <CH title="Por Sucursal" icon="🏢"/>
        <div style={{padding:"16px 20px"}}>
          {bt.map(b=><div key={b.id} style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}><div><div style={{fontFamily:FH,fontSize:13,fontWeight:600,color:C.t}}>{b.name}</div><div style={{fontSize:10,color:C.m}}>{b.trips} viajes</div></div><span style={{fontFamily:FH,fontSize:15,fontWeight:700,color:b.color}}>{fmt(b.cost)}</span></div><div style={{height:4,background:C.s3,borderRadius:2,overflow:"hidden"}}><div style={{width:pct(b.cost,maxC)+"%",height:"100%",background:b.color,borderRadius:2}}/></div>{b.budget&&<div style={{fontSize:10,color:b.cost>b.budget?C.r:C.m,marginTop:3,fontFamily:FM}}>{pct(b.cost,b.budget)}% del presupuesto {b.cost>b.budget?"⚠ EXCEDIDO":""}</div>}</div>)}
          <div style={{marginTop:12,paddingTop:14,borderTop:"1px solid "+C.b}}><div style={{fontFamily:FH,fontSize:13,fontWeight:600,color:C.t,marginBottom:12}}>Ocupación Promedio</div><div style={{display:"flex",justifyContent:"space-around"}}>{rs.slice(0,3).map((r,i)=><Ring key={r.id} value={r.avgOcc} color={[C.a,C.p,C.r][i]} label={r.code}/>)}</div></div>
        </div>

  </div>;

  const{routes}=data;

  const[names,sNames]=React.useState([]);

  const fileRef=React.useRef();
  const OCR_MOCK=[{raw:"María González Díaz",conf:0.97,sig:true,emp:"María González Díaz"},{raw:"Carlos Eduardo Peña",conf:0.95,sig:true,emp:"Carlos Eduardo Peña"},{raw:"Luis Antonio Herrera",conf:0.91,sig:true,emp:"Luis Antonio Herrera"},{raw:"Ana Patricia Vargas",conf:0.88,sig:false,emp:"Ana Patricia Vargas"},{raw:"Rob??o Mart??ez N.",conf:0.61,sig:false,emp:null},{raw:"Sandra Lucía Torres",conf:0.93,sig:true,emp:"Sandra Lucía Torres"}];
  const openCam=()=>fileRef.current&&fileRef.current.click();
  const onFile=e=>{const file=e.target.files[0];if(!file)return;sPhoto(URL.createObjectURL(file));sOcr("processing");sNames([]);setTimeout(()=>{sNames(OCR_MOCK);sOcr("done");},2500);e.target.value="";};
  const validate=(i,v)=>sNames(ns=>ns.map((n,j)=>j===i?{...n,validated:v}:n));
  const submitQr=()=>{if(!qrF.name||!qrF.confirmed||!selR)return;const r=routes.find(x=>x.id===selR)||{};const now=new Date().toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit"});sFeed(f=>[{time:now,name:qrF.name,route:r.code,method:"QR",ok:true},...f]);sQrD(true);sQrF({name:"",confirmed:false});setTimeout(()=>sQrD(false),3000);};
  return <div className="g2d pa">
    <Card>
      <div style={{display:"flex",borderBottom:"1px solid "+C.b}}>
        {[["ocr","📷 OCR"],["qr","📱 QR"],["batch","📦 Batch"]].map(([k,l])=>(

        ))}
      </div>
      {tab==="ocr"&&<div style={{padding:20}}>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{display:"none"}}/>
        {ocrSt==="idle"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{border:"2px dashed "+C.b2,borderRadius:12,padding:"40px 20px",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>📋</div>
            <div style={{fontFamily:FH,fontSize:16,fontWeight:600,color:C.t,marginBottom:4}}>Captura el listado físico</div>
            <div style={{fontSize:12,color:C.m,marginBottom:18}}>OCR extrae nombres y firmas automáticamente</div>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
              <Btn primary onClick={openCam}>📷 Abrir Cámara</Btn>
              <Btn ghost onClick={openCam}>🖼️ Desde Galería</Btn>
            </div>
          </div>
          <div style={{padding:"11px 14px",background:C.s2,borderRadius:8,fontSize:11,color:C.m,lineHeight:1.7}}>💡 <strong style={{color:C.t}}>Tip:</strong> Buena iluminación, lista plana = mejor resultado OCR.</div>
        </div>}
        {ocrSt==="processing"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          {photo&&<div style={{width:"100%",aspectRatio:"4/3",borderRadius:10,overflow:"hidden",position:"relative"}}><img src={photo} alt="Lista" style={{width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10}}><div style={{width:8,height:8,borderRadius:"50%",background:C.a,animation:"pulse_ 1s infinite"}}/><div style={{color:"#fff",fontFamily:FH,fontSize:14}}>Procesando con OCR…</div></div></div>}
          <div style={{height:4,background:C.s3,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,"+C.a+","+C.p+")",borderRadius:2,animation:"prog 2.5s ease-out forwards",width:"0%"}}/></div>
        </div>}

          </div>

          <label htmlFor="batch-input" style={{cursor:"pointer"}}><Btn primary>📂 Seleccionar Archivos</Btn></label>
        </div>
        {[["listado_01_may.jpg","done",44,""],["listado_02_may.jpg","proc",null,""],["listado_03_may.jpg","rev",null,"3 ilegibles"]].map(([name,status,n,note],i)=>(
          <div key={i} style={{padding:"10px 14px",marginBottom:6,background:C.s2,border:"1px solid "+C.b,borderRadius:9,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontSize:16}}>📷</span><span style={{flex:1,fontSize:12,color:C.t}}>{name}</span>
            {status==="done"&&<><span style={T.ok}>✓ Procesado</span><span style={{fontSize:11,color:C.m}}>{n} empleados</span></>}
            {status==="proc"&&<><div style={{width:7,height:7,borderRadius:"50%",background:C.a,animation:"pulse_ 1s infinite"}}/><span style={T.warn}>Procesando…</span></>}
            {status==="rev"&&<><span style={T.bad}>⚠ Revisión</span><span style={{fontSize:11,color:C.m}}>{note}</span></>}
          </div>
        ))}
      </div>}
    </Card>
    <Card>
      <CH title="Check-ins en Vivo" icon="🔴" right={<div style={{width:7,height:7,borderRadius:"50%",background:C.a,animation:"pulse_ 1.5s infinite"}}/>}/>
      {feed.slice(0,12).map((c,i)=>(
        <div key={i} style={{padding:"10px 16px",borderBottom:"1px solid "+C.b,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontFamily:FM,fontSize:10,color:i<2?C.a:C.m,width:36}}>{c.time}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.t}}>{c.name}</div><div style={{fontSize:10,color:C.m}}>{c.method} · {c.route}</div></div>
          <span style={c.ok?T.ok:T.warn}>{c.ok?"✓":"Rev"}</span>
        </div>
      ))}
      <div style={{padding:"12px 16px",borderTop:"1px solid "+C.b,fontSize:11,color:C.m,textAlign:"center",fontFamily:FM}}>{feed.length} registros hoy</div>
    </Card>
  </div>;
}

// ─── PAGE: TRIPS ──────────────────────────────────────────────────────────────
function PageTrips({data,onAdd}){
  const{routes,vehicles,trips}=data;
  return <div style={{display:"flex",flexDirection:"column",gap:14}} className="pa">
    <div style={{display:"flex",justifyContent:"flex-end"}}><Btn primary onClick={()=>onAdd("trip")}>+ Nuevo Viaje</Btn></div>
    <Card>
      <CH title={"Viajes ("+trips.length+")"} icon="🗺️"/>
      <table className="rt">
        <thead><tr>{["Fecha","Ruta","Vehículo","Pasajeros","Ocupación","Costo","$/p","Fuente"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{trips.slice().reverse().map(t=>{
          const r=routes.find(x=>x.id===t.rId)||{};const v=vehicles.find(x=>x.id===t.vId)||{cap:1};const o=pct(t.pass,v.cap);
          return <tr key={t.id}>
            <td><span style={{fontFamily:FM,fontSize:11,color:C.m}}>{t.date}</span></td>
            <td><div style={{fontFamily:FH,fontSize:13,fontWeight:600,color:C.t}}>{r.code}</div><div style={{fontSize:11,color:C.m}}>{r.name}</div></td>
            <td><div style={{fontSize:12,color:C.t}}>{v.plate}</div><div style={{fontSize:11,color:C.m}}>{v.driver}</div></td>
            <td><span style={{fontFamily:FM,fontSize:12}}>{t.pass}/{v.cap}</span></td>
            <td><EffBar pct={o} color={o>=70?C.a:C.y}/></td>
            <td><span style={{fontFamily:FH,fontSize:14,fontWeight:700,color:C.a}}>{fmt(t.cost)}</span></td>
            <td><span style={{fontFamily:FM,fontSize:11,color:C.y}}>{fmtD(t.cost/(t.pass||1))}</span></td>
            <td><span style={t.src==="QR"?T.ok:t.src==="OCR"?T.p:T.m}>{t.src}</span></td>
          </tr>;
        })}</tbody>
      </table>
    </Card>
  </div>;
}

// ─── PAGE: REPORTS ────────────────────────────────────────────────────────────
function PageReports({data}){
  const{routes,vehicles,trips}=data;
  const[exp,sExp]=React.useState(false);
  const totalCost=trips.reduce((s,t)=>s+t.cost,0),totalPass=trips.reduce((s,t)=>s+t.pass,0);
  const stats=routes.filter(r=>r.active).map(r=>{const ts=trips.filter(t=>t.rId===r.id);const tc=ts.reduce((s,t)=>s+t.cost,0),tp=ts.reduce((s,t)=>s+t.pass,0);const v=vehicles.find(x=>x.id===r.vId)||{cap:1};const ao=ts.length?ts.reduce((s,t)=>s+pct(t.pass,v.cap),0)/ts.length:0;return{...r,trips:ts.length,totalCost:tc,totalPass:tp,avgCPP:tp>0?tc/tp:0,avgOcc:Math.round(ao)};}).sort((a,b)=>b.totalCost-a.totalCost);
  return <div style={{display:"flex",flexDirection:"column",gap:14}} className="pa">
    <Card style={{padding:18}}><div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
      {[["DESDE","date","2025-06-01"],["HASTA","date","2025-06-30"]].map(([l,t,d])=><div key={l}><div style={{fontSize:10,color:C.m,marginBottom:5,fontFamily:FM,letterSpacing:"1px"}}>{l}</div><Input type={t} defaultValue={d} style={{width:"auto"}}/></div>)}
      <div><div style={{fontSize:10,color:C.m,marginBottom:5,fontFamily:FM,letterSpacing:"1px"}}>SUCURSAL</div><Select style={{width:"auto"}}><option>Todas</option>{BRANCHES.map(b=><option key={b.id}>{b.name}</option>)}</Select></div>
      <Btn primary onClick={()=>{sExp(true);setTimeout(()=>sExp(false),2500);}}>{exp?"✅ Generado!":"⬇ Exportar Excel"}</Btn>
    </div></Card>
    <div className="g4">
      <KPI label="Costo Total"   value={fmt(totalCost)} sub="Jun 2025" color={C.a} icon="💰"/>
      <KPI label="Costo/Persona" value={fmtD(totalPass>0?totalCost/totalPass:0)} sub="Promedio" color={C.y} icon="👤"/>
      <KPI label="Ruta más cara" value={stats[0]?.code||"—"} sub={fmt(stats[0]?.totalCost||0)} color={C.o} icon="🔺"/>
      <KPI label="Mejor Ocup."  value={[...stats].sort((a,b)=>b.avgOcc-a.avgOcc)[0]?.code||"—"} sub="Mayor ocupación" color={C.p} icon="⭐"/>
    </div>
    <Card>
      <CH title="Costo por Persona por Ruta — Junio 2025" icon="📋"/>
      <table className="rt">
        <thead><tr>{["Ruta","Sucursal","Viajes","Pasajeros","Costo Total","$/Persona","Ocupación","Estado"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{stats.map(r=>{const b=BRANCHES.find(x=>x.id===r.bId)||{};const et=r.avgOcc>=80?T.ok:r.avgOcc>=60?T.warn:T.bad;return <tr key={r.id}>
          <td><div style={{fontFamily:FH,fontSize:13,fontWeight:600,color:C.t}}>{r.code} — {r.name}</div></td>
          <td style={{fontSize:12,color:C.m}}>{b.name}</td>
          <td><span style={{fontFamily:FM,fontSize:12}}>{r.trips}</span></td>
          <td><span style={{fontFamily:FM,fontSize:12}}>{r.totalPass}</span></td>
          <td><span style={{fontFamily:FH,fontSize:14,fontWeight:700,color:C.a}}>{fmt(r.totalCost)}</span></td>
          <td><span style={{fontFamily:FM,fontSize:12,color:C.y}}>{fmtD(r.avgCPP)}</span></td>
          <td><EffBar pct={r.avgOcc} color={r.avgOcc>=70?C.a:C.y}/></td>
          <td><span style={et}>{r.avgOcc>=80?"Óptima":r.avgOcc>=60?"Revisar":"Ineficiente"}</span></td>
        </tr>;})}
        </tbody>
        <tfoot><tr style={{borderTop:"2px solid "+C.b2}}><td colSpan={3} style={{padding:"12px 16px",fontFamily:FH,fontSize:14,fontWeight:700,color:C.t}}>TOTAL</td><td style={{padding:"12px 16px",fontFamily:FM,fontSize:13,fontWeight:700}}>{totalPass}</td><td style={{padding:"12px 16px",fontFamily:FH,fontSize:15,fontWeight:800,color:C.a}}>{fmt(totalCost)}</td><td style={{padding:"12px 16px",fontFamily:FM,fontSize:13,color:C.y}}>{fmtD(totalPass>0?totalCost/totalPass:0)}</td><td colSpan={2}/></tr></tfoot>
      </table>
    </Card>
  </div>;
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
const NAV_C=[
  {id:"dashboard",  label:"Dashboard",    icon:"📊",group:"Principal"},
  {id:"trips",      label:"Viajes",        icon:"🗺️",group:"Principal",badge:3},
  {id:"checkin",    label:"Check-in",      icon:"📷",group:"Principal"},
  {id:"mapa",       label:"Mapa & Rutas",  icon:"🗺️",group:"Operaciones"},
  {id:"empleados",  label:"Empleados",     icon:"👥",group:"Operaciones"},
  {id:"conductores",label:"Conductores",   icon:"🧑‍✈️",group:"Operaciones"},
  {id:"reports",    label:"Reportes",      icon:"📋",group:"Análisis"},
];
const NAV_P=[
  {id:"provider",   label:"Mi Panel",      icon:"🏠",group:"Principal"},
  {id:"checkin",    label:"Check-in",      icon:"📷",group:"Operaciones"},
  {id:"trips",      label:"Mis Viajes",    icon:"🗺️",group:"Operaciones"},
  {id:"conductores",label:"Conductores",   icon:"🧑‍✈️",group:"Operaciones"},
  {id:"mapa",       label:"Mapa & Rutas",  icon:"🗺️",group:"Análisis"},
];

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[role,sRole]=React.useState("coordinator");
  const[page,sPage]=React.useState("dashboard");
  const[side,sSide]=React.useState(false);
  const[period,sPeriod]=React.useState("MES");
  const[modal,sModal]=React.useState(null);
  const[editItem,sEditItem]=React.useState(null);

  const[vehicles,sVehicles]=React.useState(INIT_V);
  const[routes,sRoutes]=React.useState(INIT_R);
  const[trips,sTrips]=React.useState(INIT_T);
  const[destinations,sDests]=React.useState(INIT_D);
  const[users,sUsers]=React.useState(INIT_U);

  const data={branches:BRANCHES,vehicles,routes,trips,destinations,users};

  const switchRole=r=>{sRole(r);sPage(r==="coordinator"?"dashboard":"provider");sSide(false);};
  const nav=id=>{sPage(id);sSide(false);};
  const openAdd=t=>{sEditItem(null);sModal(t);};
  const openEdit=(t,item)=>{sEditItem(item);sModal(t);};

  const saveVehicle=v=>{sVehicles(vs=>v.id&&vs.find(x=>x.id===v.id)?vs.map(x=>x.id===v.id?v:x):[...vs,v]);};
  const toggleVehicle=id=>sVehicles(vs=>vs.map(v=>v.id===id?{...v,active:!v.active}:v));
  const saveDest=d=>{sDests(ds=>d.id&&ds.find(x=>x.id===d.id)?ds.map(x=>x.id===d.id?d:x):[...ds,d]);};
  const saveUser=u=>{sUsers(us=>u.id&&us.find(x=>x.id===u.id)?us.map(x=>x.id===u.id?u:x):[...us,u]);};
  const toggleUser=id=>sUsers(us=>us.map(u=>u.id===id?{...u,active:!u.active}:u));
  const saveRoute=r=>{sRoutes(rs=>r.id&&rs.find(x=>x.id===r.id)?rs.map(x=>x.id===r.id?r:x):[...rs,r]);};
  const saveTrip=t=>{sTrips(ts=>[...ts,t]);};

  const NAV=role==="coordinator"?NAV_C:NAV_P;
  const groups=[...new Set(NAV.map(n=>n.group))];

  const TITLES={dashboard:"Dashboard",provider:"Mi Panel",trips:role==="provider"?"Mis Viajes":"Viajes",checkin:"Check-in",mapa:"Mapa & Rutas",empleados:"Empleados",conductores:"Conductores",reports:"Reportes"};

  return <div style={{display:"flex",minHeight:"100vh",background:C.bg,fontFamily:FB,color:C.t}}>

    {/* Modals */}
    {modal==="driver"   &&<ModalConductor existing={editItem} onSave={v=>{saveVehicle(v);sModal(null);}} onClose={()=>sModal(null)}/>}
    {modal==="dest"     &&<ModalDestino   existing={editItem} onSave={d=>{saveDest(d);sModal(null);}} onClose={()=>sModal(null)}/>}
    {modal==="user"     &&<ModalUsuario   existing={editItem} destinations={destinations} onSave={u=>{saveUser(u);sModal(null);}} onClose={()=>sModal(null)}/>}
    {modal==="route"    &&<ModalRuta      existing={editItem} vehicles={vehicles} onSave={r=>{saveRoute(r);sModal(null);}} onClose={()=>sModal(null)}/>}
    {modal==="trip"     &&<ModalViaje     routes={routes} vehicles={vehicles} onSave={t=>{saveTrip(t);sModal(null);}} onClose={()=>sModal(null)}/>}

    <div className={"so"+(side?" show":"")} onClick={()=>sSide(false)}/>

    {/* Sidebar */}
    <aside className={"sidebar"+(side?" open":"")} style={{width:230,background:C.s,borderRight:"1px solid "+C.b,display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:100}}>
      <div style={{padding:"20px 20px 16px",borderBottom:"1px solid "+C.b}}>
        <div style={{fontFamily:FH,fontSize:22,fontWeight:700,letterSpacing:"-0.5px",color:C.t}}>
          <span style={{color:C.a}}>Trans</span>Log
          <span style={{fontFamily:FM,fontSize:10,color:C.m,marginLeft:8}}>v2.0</span>
        </div>
        <div style={{fontFamily:FM,fontSize:9,color:C.m,letterSpacing:"2px",textTransform:"uppercase",marginTop:3}}>Transporte Corporativo</div>
      </div>

      {/* Role toggle */}
      <div style={{margin:"12px 14px 6px",padding:"4px",background:C.s2,borderRadius:9,border:"1px solid "+C.b,display:"flex",gap:3}}>
        {[["coordinator","Coordinador"],["provider","Proveedor"]].map(([r,l])=>(
          <div key={r} onClick={()=>switchRole(r)} style={{flex:1,textAlign:"center",padding:"7px 0",borderRadius:7,fontSize:11,fontFamily:FM,cursor:"pointer",background:role===r?C.s3:"transparent",color:role===r?C.a:C.m,transition:"all .15s"}}>{l}</div>
        ))}
      </div>
      <div style={{margin:"0 14px 10px",padding:"5px 11px",borderRadius:7,fontSize:10,fontFamily:FM,background:role==="coordinator"?"rgba(129,140,248,.1)":"rgba(16,217,168,.08)",color:role==="coordinator"?C.p:C.a,border:"1px solid "+(role==="coordinator"?C.p+"44":C.a+"33")}}>
        {role==="coordinator"?"● Coordinador Regional":"● Proveedor de Transporte"}
      </div>

      <nav style={{flex:1,padding:"4px 0",overflowY:"auto"}}>
        {groups.map(g=><div key={g}>
          <div style={{padding:"10px 18px 5px",fontSize:9,textTransform:"uppercase",letterSpacing:"2px",color:C.m,fontFamily:FM}}>{g}</div>
          {NAV.filter(n=>n.group===g).map(n=>(
            <div key={n.id} onClick={()=>nav(n.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 18px",fontSize:13,cursor:"pointer",color:page===n.id?C.a:C.m,borderLeft:"3px solid "+(page===n.id?C.a:"transparent"),background:page===n.id?"rgba(16,217,168,.05)":"transparent",fontWeight:page===n.id?600:400,transition:"all .15s"}}>
              <span style={{fontSize:16,width:20,textAlign:"center"}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge&&<span style={{background:C.r,color:"#fff",fontSize:9,fontFamily:FM,padding:"2px 6px",borderRadius:10}}>{n.badge}</span>}
            </div>
          ))}
        </div>)}
      </nav>

      {role==="provider"&&<div style={{padding:"12px 14px",borderTop:"1px solid "+C.b,display:"flex",flexDirection:"column",gap:6}}>
        <Btn primary small onClick={()=>openAdd("trip")}   style={{width:"100%",justifyContent:"center"}}>🚌 Registrar Viaje</Btn>
        <Btn ghost  small onClick={()=>openAdd("route")}  style={{width:"100%",justifyContent:"center"}}>🛣️ Nueva Ruta</Btn>
        <Btn ghost  small onClick={()=>openAdd("driver")} style={{width:"100%",justifyContent:"center"}}>🧑‍✈️ Nuevo Conductor</Btn>
      </div>}

      <div style={{padding:"14px 18px",borderTop:"1px solid "+C.b,display:"flex",gap:10,alignItems:"center"}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,"+(role==="coordinator"?C.p:C.a)+","+C.a+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:C.bg}}>{role==="coordinator"?"CR":"RP"}</div>
        <div><div style={{fontSize:13,fontWeight:600,color:C.t,fontFamily:FH}}>{role==="coordinator"?"Carlos Rivera":"Rafael Proveedor"}</div><div style={{fontSize:10,color:C.m,fontFamily:FM}}>{role==="coordinator"?"Coord. Regional":"Proveedor"}</div></div>
      </div>
    </aside>

    {/* Main */}
    <main className="mc" style={{marginLeft:230,flex:1,padding:"20px",minHeight:"100vh",maxWidth:"100%",overflowX:"hidden"}}>
      {/* Hamburger */}
      <div className="hb" style={{display:"none",alignItems:"center",gap:12,marginBottom:16}}>
        <button onClick={()=>sSide(true)} style={{background:C.s2,border:"1px solid "+C.b,borderRadius:9,padding:"9px 14px",color:C.t,fontSize:18,cursor:"pointer",lineHeight:1}}>☰</button>
        <div style={{fontFamily:FH,fontSize:18,fontWeight:700}}><span style={{color:C.a}}>Trans</span><span style={{color:C.t}}>Log</span></div>
        {role==="provider"&&<Btn primary small onClick={()=>openAdd("trip")} style={{marginLeft:"auto"}}>+ Viaje</Btn>}
      </div>

      {/* Page header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22,gap:12,flexWrap:"wrap"}}>
        <div>
          <h1 style={{fontFamily:FH,fontSize:26,fontWeight:700,letterSpacing:"-0.5px",color:C.t}}>{TITLES[page]||"TransLog"}</h1>
          <div style={{fontFamily:FM,fontSize:10,color:C.m,marginTop:4,letterSpacing:"0.5px"}}>TRANSLOG v2.0 · {role==="coordinator"?"VISTA COORDINADOR":"VISTA PROVEEDOR"}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
          {page==="dashboard"&&<div style={{display:"flex",background:C.s,border:"1px solid "+C.b,borderRadius:9,padding:3,gap:2}}>{["7D","MES","TRIM","AÑO"].map(p=><div key={p} onClick={()=>sPeriod(p)} style={{padding:"5px 12px",borderRadius:7,fontSize:11,cursor:"pointer",fontFamily:FM,background:period===p?C.s3:"transparent",color:period===p?C.t:C.m,transition:"all .15s"}}>{p}</div>)}</div>}
          {(page==="reports"||page==="dashboard")&&<Btn primary small>⬇ Exportar</Btn>}
          {page==="trips"         &&<Btn primary small onClick={()=>openAdd("trip")}>+ Nuevo Viaje</Btn>}
          {page==="conductores"   &&<Btn primary small onClick={()=>openAdd("driver")}>+ Conductor</Btn>}
          {page==="empleados"     &&<Btn primary small onClick={()=>openAdd("user")}>+ Empleado</Btn>}
          {page==="mapa"          &&<Btn primary small onClick={()=>openAdd("dest")}>+ Destino</Btn>}
          {page==="provider"      &&<Btn primary small onClick={()=>openAdd("trip")}>+ Viaje</Btn>}
        </div>
      </div>

      {page==="dashboard"  &&<CoordDashboard data={data}/>}
      {page==="provider"   &&<ProviderHome   data={data} onAdd={openAdd}/>}
      {page==="trips"      &&<PageTrips      data={data} onAdd={openAdd}/>}
      {page==="checkin"    &&<PageCheckin    data={data}/>}
      {page==="mapa"       &&<PageMapa       routes={routes} vehicles={vehicles} destinations={destinations} users={users} onAddDest={()=>openAdd("dest")} onEditDest={d=>openEdit("dest",d)}/>}
      {page==="empleados"  &&<PageEmpleados  users={users} destinations={destinations} onAdd={()=>openAdd("user")} onEdit={u=>openEdit("user",u)} onToggle={toggleUser}/>}
      {page==="conductores"&&<PageConductores vehicles={vehicles} onAdd={()=>openAdd("driver")} onEdit={v=>openEdit("driver",v)} onToggle={toggleVehicle}/>}
      {page==="reports"    &&<PageReports    data={data}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
