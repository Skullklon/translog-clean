# Nginx vhost for the Nexura Transport admin app.
# Reverse-proxies all traffic to the local PM2 Node process on :4000.

upstream nexura_app {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.nexorard.org;

    server_tokens off;

    # Hard limit on request size (protects against absurd uploads)
    client_max_body_size 5m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Enable HSTS only AFTER you're confident HTTPS will always work — see deployment/03.
    # add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Reverse proxy everything to Node
    location / {
        proxy_pass http://nexura_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Modest in-Nginx rate limit, in addition to express-rate-limit
        # (uncomment the limit_req_zone in /etc/nginx/nginx.conf first)
        # limit_req zone=app_zone burst=20 nodelay;
    }

    # Don't log noise from health probes
    location = /healthz {
        access_log off;
        proxy_pass http://nexura_app;
    }
    location = /readyz {
        access_log off;
        proxy_pass http://nexura_app;
    }

    location ~ /\. { deny all; }

    # certbot will inject the TLS server block below
}
