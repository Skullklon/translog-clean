# Nginx vhost for the Nexura RD landing page.
# Install into /etc/nginx/sites-available/ and symlink into sites-enabled/.
# Run `certbot --nginx -d nexorard.org -d www.nexorard.org` to add the TLS blocks.

server {
    listen 80;
    listen [::]:80;
    server_name nexorard.org www.nexorard.org;

    # Document root — copy the contents of landing-page/ here.
    root /var/www/nexorard.org;
    index index.html;

    # Hide Nginx version
    server_tokens off;

    # Security headers (basic — Nginx repeats them per response)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Long cache for static assets, short for HTML
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, max-age=0";
    }

    location ~* \.(css|js|svg|woff2?|png|jpg|jpeg|gif|webp|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Gzip — Nginx is gzipped by default at /etc/nginx/nginx.conf; uncomment if not
    # gzip on;
    # gzip_types text/css application/javascript image/svg+xml application/json;

    # Disallow access to dotfiles
    location ~ /\. { deny all; }

    # certbot will inject "listen 443 ssl;" and "ssl_certificate" lines below
}
